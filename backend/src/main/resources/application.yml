spring:
  application:
    name: cardstream-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardstream}
    username: ${SPRING_DATASOURCE_USERNAME:cardstream}
    password: ${SPRING_DATASOURCE_PASSWORD:cardstream}
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Idempotent producer (exactly-once per partition). JSON value serialization (ISO-8601 instants,
      # no type headers) is wired in KafkaProducerConfig so the wire format matches the event schema.
      properties:
        enable.idempotence: true
      acks: all
    consumer:
      # Sink consumer (MarketSinkConsumer): values parsed manually with the app ObjectMapper (no type
      # headers on the wire), so String suffices for both key and value here.
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    streams:
      # application-id namespaces the consumer group + internal topics/state stores; serdes, timestamp
      # extractor, and other settings are set in KafkaStreamsTopologyConfig.
      application-id: ${KAFKA_STREAMS_APP_ID:cardstream-streams}

server:
  port: ${SERVER_PORT:8080}

# Catalog scope + Pokémon TCG API. Lower since-release-date to backfill older sets.
market:
  catalog:
    api-base-url: ${POKEMONTCG_API_BASE:https://api.pokemontcg.io/v2}
    api-key: ${POKEMONTCG_API_KEY:}
    since-release-date: 2024-01-01
    page-size: 250
    load-on-startup: false
  # Streams topology thresholds (Appendix C). min-samples is the cold-start gate for spike/arbitrage.
  thresholds:
    spike-sigma: 3.0
    arbitrage-margin: 0.15
    min-samples: 20

# Multi-source ingestion. The poller runs only enabled sources; a second feed (real TCGplayer)
# is added by config alone. The ingestor is the trust boundary — `validation.*` bounds every event.
ingestion:
  enabled: ${INGESTION_ENABLED:true}
  poll-interval: 2s
  validation:
    min-price: 0.01
    max-price: 1000000
    max-quantity: 10000
    max-future-skew: 5m
    max-age: 365d
    max-price-scale: 2
  sources:
    sim:
      enabled: true
      type: tcgplayer-rest
      base-url: ${INGESTION_SIM_BASE_URL:http://localhost:8081}
      max-events-per-poll: 1000
    tcgplayer:
      enabled: false
      type: tcgplayer-rest
      base-url: https://api.tcgplayer.com
      # api-key: <set when enabling>

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    # Don't fail the whole health check when Kafka isn't reachable during local standalone runs.
    kafka:
      enabled: false
