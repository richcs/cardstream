# Test profile: context-load smoke test runs offline.
# In-memory H2 stands in for Postgres; Flyway is disabled (no schema needed to verify wiring).
spring:
  datasource:
    url: jdbc:h2:mem:cardstream;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
  flyway:
    enabled: false
  kafka:
    streams:
      # The topology is built (verifying wiring) but not started — no broker in the smoke test.
      auto-startup: false

market:
  catalog:
    load-on-startup: false

# No live simulator/broker in the context-load test — keep the poller idle.
ingestion:
  enabled: false
